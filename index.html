<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객안내용 차트수정</title>

  <!-- Pretendard 폰트 적용 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff; 
      --primary: #f06292; /* 메인 핑크 */
      --primary-dark: #d81b60; 
      --primary-light: #fce4ec; /* 배경 핑크 */
      --text: #373d49; /* Sophisticated dark grey */
      --text-light: #6b7280;
      --card-bg: #ffffff;
      --border: rgba(240, 98, 146, 0.2);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
      --radius: 20px;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      font-family: "Pretendard", "Noto Sans KR", sans-serif !important;
      color: var(--text);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px 20px;
      text-align: center;
      background: var(--primary-light); 
      border-bottom: 2px solid rgba(240, 98, 146, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(240, 98, 146, 0.05);
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.7px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
      width: 100%;
      flex: 1;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .actions { display: flex; gap: 10px; }

    .btn {
      border: none;
      padding: 12px 24px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .btn-copy {
      background: var(--primary);
      color: white !important;
      box-shadow: 0 4px 15px rgba(240, 98, 146, 0.2);
    }
    .btn-copy:hover { 
      background: var(--primary-dark);
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.25);
    }

    .btn-clear {
      background: #fff;
      color: var(--text-light) !important;
      border: 1px solid #eee;
    }
    .btn-clear:hover { background: #fafafa; border-color: #ddd; }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
    }

    @media (max-width: 850px) {
      .editor-grid { grid-template-columns: 1fr; }
      .toolbar { justify-content: center; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }
    }

    .panel {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .panel-header {
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #f9f9f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title { font-size: 14px; font-weight: 700; color: var(--text-light); }

    .status-badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 700;
      border: 1px solid rgba(240, 98, 146, 0.1);
    }

    textarea {
      width: 100%;
      height: 480px;
      padding: 20px;
      border: none;
      resize: none;
      font-size: 14px;
      line-height: 1.8;
      background: transparent;
      outline: none;
      color: var(--text);
    }

    #output { background: #fff; }

    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <header>
    <h1>블리비 홍대점 | 고객안내용 차트수정</h1>
  </header>

  <div class="container">
    <div class="toolbar">
      <div class="actions">
        <button id="btnClear" class="btn btn-clear">초기화</button>
        <button id="btnCopy" class="btn btn-copy">결과 복사</button>
      </div>
    </div>

    <div class="editor-grid">
      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">원본 데이터 입력</span>
          <span id="inputStatus" class="status-badge">대기중</span>
        </div>
        <textarea id="input" placeholder="차트 내용을 붙여넣으세요."></textarea>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">정리된 결과</span>
        </div>
        <textarea id="output" placeholder="정리된 결과가 표시됩니다."></textarea>
      </section>
    </div>
  </div>

  <div id="toast">복사되었습니다.</div>

  <script>
    const elInput = document.getElementById('input');
    const elOutput = document.getElementById('output');
    const elStatus = document.getElementById('inputStatus');
    const elBtnCopy = document.getElementById('btnCopy');
    const elBtnClear = document.getElementById('btnClear');
    const elToast = document.getElementById('toast');

    const kwPattern = /(승모근|이마|눈가|미간|자갈턱|종아리|허벅지|눈밑|입꼬리|스킨|사각턱|측두근|턱|광대|보상근|인중|침샘|주름)\s*(?:btx|b)\b/gi;
    const fillerPattern = /(팔자|옆볼|눈밑고랑|눈밑|앞볼|미간|이마|관자|관자놀이|입술|애교|입꼬리|코|콧대|턱|턱끝|마리오넷|주름|볼)\s*f\b/gi;

    function transformText(line) {
      let v = line.trim();
      if (!v) return null;

      // 1. 특정 텍스트 삭제 (1-1 등)
     v = v.replace(/\b1-1\b/g, " ");

// 1-2. 추가 요청 단어 삭제 (*마크뷰+, 마크뷰 등)
// 특수문자(*)가 포함되어 있으므로 이스케이프(\*) 처리와 긴 단어부터 매칭되도록 순서를 배치했습니다.
v = v.replace(/\*마크뷰\+|\*마크뷰|마크뷰완료|마크뷰\+|마크뷰|\*마크\+|\*마\+|\*마크/g, "");
      
      // 불필요한 줄 필터링
      if (v.startsWith("L") || v.startsWith("★") || v.startsWith("원장님") || 
          v.startsWith("**") || v.startsWith("특이사항") || v.startsWith("이름") || 
          v.startsWith("내원경로") || v.startsWith("~") || v.includes("전화번호")) return null;

      // 2. 기본 약어 치환
      v = v.replace(/스보/g, "스킨보톡스")
           .replace(/브제/g, "브라질리언 제모")
           .replace(/얼전|풀페이스|풀페/g, "얼굴전체")
           .replace(/겨제/g, "겨드랑이 제모")
           .replace(/ta/gi, "염증주사")
           .replace(/구득권/g, "구독권")
           .replace(/셀바이오/g, "셀바이브")
           .replace(/\bs[\.,]?\s*v\b/gi, "서비스");

      v = v.replace(/비에녹스|비에|코어/g, "국산 고순도")
           .replace(/하이(?!쿡스)|리즈|메디/g, "국산일반");

      // 3. 회원권 패턴 (VIP 숫자 뒤에 '원' 붙지 않도록 미리 보호)
      v = v.replace(/(VIP|vip|쁘(?:띠)?)\s?(\d+)\s?(?:전환)?\s?\(\s?(\d+)\s?(?:결제)?\s+(\d+)\s?(?:적립)?\s?\)/gi, (match, p1, p2, p3, p4) => {
        const prefix = p1.toUpperCase().includes('VIP') ? 'VIP' : '쁘띠회원권';
        return `PROTECTED_${prefix}${p2}전환(${p3}만원 결제, ${p4}만원적립)`;
      });

         v = v.replace(/(VIP|vip|쁘(?:띠)?)\s?(\d+)\s?\+\s?(\d+)(?:\([^)]*\))?/g, (match, p1, p2, p3) => {
        const prefix = p1.includes('쁘') ? '쁘띠회원권' : 'VIP';
        return `${prefix}${p2}만원+${p3}만원 적립`;
      });

      // 4. 잔액 패턴 보호
     v = v.replace(/(?:잔액|잔여|잔금|잔|쁘잔)(?:\s|:|[-)>])+(\d{1,3}(?:[.,]\d{3})+|\d+)/g, (match, p1) => {
  let numStr = p1.replace(/[.,]/g, "");
  let num = parseInt(numStr, 10);
  return !isNaN(num) ? `PROTECTED_잔액 ${num.toLocaleString()}원` : match;
});

      // 5. 쁘띠/필러 약어 변환
      v = v.replace(kwPattern, (match, kw) => kw + "보톡스")
           .replace(fillerPattern, (match, kw) => kw + "필러");

      // 6. 금액 및 숫자 처리
      // 마침표(.)나 쉼표(,)가 포함된 숫자열 전체를 찾아 처리
      v = v.replace(/(\d{1,3}(?:[.,]\d{3})+|\d{3,12})/g, (match, p1, offset, string) => {
        
        // 주변 텍스트 확인 (이미 보호되었거나 단위가 붙었는지)
        const before = string.substring(0, offset);
        const after = string.substring(offset + match.length);
        
        if (before.includes("PROTECTED_")) return match;

        // 뒤에 단위가 오면 그대로 반환 (샷, cc, 줄 등)
        if (/^\s*(?:샷|cc|u|unit|유닛|회|개|팩|분|줄|세|만|결제|적립|전환)/i.test(after)) {
            return match;
        }

        // 숫자 정제 (마침표, 쉼표 제거 후 재포맷)
        let numStr = match.replace(/[.,]/g, "");
        let num = parseInt(numStr, 10);
        if (isNaN(num)) return match;
        
        let formatted = num.toLocaleString();

        // 뒤에 이미 '원'이 있는지 확인
        if (/^\s*원/.test(after)) {
            return formatted;
        }

        return formatted + "원";
      });

      // 보호 태그 제거 및 중복 '원' 정리
      return v.replace(/PROTECTED_/g, "")
              .replace(/원원/g, "원")
              .replace(/\s+/g, " ")
              .trim();
    }

    function process() {
      const raw = elInput.value;
      if (!raw.trim()) {
        elOutput.value = "";
        elStatus.textContent = "대기중";
        return;
      }
      const lines = raw.split(/\r?\n/);
      const results = lines.map(transformText).filter(x => x !== null && x.trim() !== "");
      elOutput.value = results.join('\n');
      elStatus.textContent = "완료";
    }

    elBtnCopy.addEventListener('click', () => {
      if (!elOutput.value) return;
      elOutput.select();
      document.execCommand('copy');
      elToast.classList.add('show');
      setTimeout(() => elToast.classList.remove('show'), 2000);
    });

    elBtnClear.addEventListener('click', () => {
      elInput.value = "";
      process();
    });

    elInput.addEventListener('input', process);
  </script>
    <footer>
      &copy; 2026. Designed & Developed by EUNBIN GA
    </footer>
  </div>
</body>
</html>
