<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원권 내역 정리 | 은빈S</title>

  <!-- Noto Sans KR 폰트 로드 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff; 
      --primary: #f06292; 
      --primary-dark: #d81b60; 
      --primary-light: #fce4ec;
      --text: #333333;
      --card-bg: #ffffff;
      --border: rgba(240, 98, 146, 0.2);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
      --radius: 20px;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      font-family: "Noto Sans KR", sans-serif !important;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px 20px;
      text-align: center;
      background: var(--primary-light); 
      border-bottom: 2px solid rgba(240, 98, 146, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(240, 98, 146, 0.05);
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #333333;
      letter-spacing: -0.7px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
      width: 100%;
      flex: 1;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .option-pill {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 9px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(240, 98, 146, 0.04);
      transition: all 0.2s ease;
      color: var(--text);
    }
    .option-pill:hover { border-color: var(--primary); transform: translateY(-1px); }
    .option-pill input { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; }

    .actions { display: flex; gap: 10px; }

    .btn {
      border: none;
      padding: 12px 24px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .btn-copy {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px rgba(240, 98, 146, 0.2);
    }
    .btn-copy:hover { 
      background: var(--primary-dark);
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(240, 98, 146, 0.25);
    }

    .btn-clear {
      background: #fff;
      color: #777;
      border: 1px solid #eee;
    }
    .btn-clear:hover { background: #fafafa; color: #444; border-color: #ddd; }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
    }

    @media (max-width: 850px) {
      .editor-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; }
    }

    .panel {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    .panel:focus-within { border-color: var(--primary); box-shadow: 0 12px 30px rgba(240, 98, 146, 0.1); }

    .panel-header {
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid #f9f9f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title { font-size: 14px; font-weight: 700; color: #555; }
    
    .status-badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 700;
      border: 1px solid rgba(240, 98, 146, 0.1);
    }

    textarea {
      width: 100%;
      height: 520px;
      padding: 20px;
      border: none;
      resize: none;
      font-size: 14px;
      line-height: 1.8;
      background: transparent;
      outline: none;
      color: var(--text);
    }
    
    #output { background: #fdfdfd; color: #444; }

    .panel-footer {
      padding: 14px 20px;
      font-size: 12px;
      background: #fafafa;
      border-top: 1px solid #f5f5f5;
      color: #999;
    }

    footer {
      padding: 20px 0;
      text-align: center;
      font-size: 13px;
      color: #9e9e9e;
      letter-spacing: 0.3px;
      font-weight: 500;
      margin-top: 10px;
    }

    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <header>
    <h1>회원권 내역 문자 발송</h1>
  </header>

  <div class="container">
    <div class="toolbar">
      <div class="options">
        <label class="option-pill">
          <input type="checkbox" id="showMembership" checked>
          <span>보유 회원권 정보</span>
        </label>
        <label class="option-pill">
          <input type="checkbox" id="showPetitInfo">
          <span>쁘띠 가능시술 안내</span>
        </label>
      </div>
      <div class="actions">
        <button id="btnClear" class="btn btn-clear">CLEAR</button>
        <button id="btnCopy" class="btn btn-copy">결과 복사</button>
      </div>
    </div>

    <div class="editor-grid">
      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">차트입력</span>
          <span id="inputStatus" class="status-badge">READY</span>
        </div>
        <textarea id="input" placeholder="차트 텍스트"></textarea>
        <div class="panel-footer">
          회원권 정보, 차감항목, 잔액 등이 포함된 텍스트 입력
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">문자 발송용 변환결과</span>
          <span id="outputStatus" class="status-badge">WAITING</span>
        </div>
        <textarea id="output" readonly placeholder="변환된 문구가 여기에 표시됩니다."></textarea>
        <div class="panel-footer" id="msgBox">
          데이터를 입력하면 문구가 자동으로 생성됩니다.
        </div>
      </section>
    </div>

    <footer>
      &copy; 2026. Designed & Developed by EUNBIN GA
    </footer>
  </div>

  <div id="toast">텍스트 복사 완료</div>

  <script>
    const elInput = document.getElementById('input');
    const elOutput = document.getElementById('output');
    const elShowMembership = document.getElementById('showMembership');
    const elShowPetitInfo = document.getElementById('showPetitInfo');
    const elBtnCopy = document.getElementById('btnCopy');
    const elBtnClear = document.getElementById('btnClear');
    const elToast = document.getElementById('toast');
    const elStatus = document.getElementById('inputStatus');
    const elOutStatus = document.getElementById('outputStatus');

    // 오늘 날짜 구하기 (yy.MM.dd 형식)
    function getToday() {
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      return `${yy}.${mm}.${dd}`;
    }

    function formatLine(line) {
      if (!line) return "";
      
      let formatted = line.trim()
        .replace(/1회차/g, "")           // 1회차 제거
        .replace(/\b1-1\b/g, "")         // 1-1 단독 표기 제거
        .replace(/(\d+)-1/g, "$1회")     // 횟수 변환 (예: 5-1 -> 5회)
        .replace(/\(하이\)/g, "(국산일반)")  // 대체어: 하이
        .replace(/\(비에녹스\)/g, "(국산 고순도)"); // 대체어: 비에녹스
      
      return formatted.replace(/\s+/g, " ").trim();
    }

    function process() {
      const raw = elInput.value.trim();
      if (!raw) {
        elOutput.value = "";
        elStatus.textContent = "READY";
        elOutStatus.textContent = "WAITING";
        return;
      }

      const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
      const today = getToday();
      
      let membership = "";
      let date = today; // 기본값은 오늘 날짜
      let usageItems = [];
      let total = "";
      let balance = "";

      // 데이터 파싱 루프
      lines.forEach(line => {
        // 1. 회원권 정보 및 구매일 파싱 (괄호 안의 날짜 패턴 매칭)
        const membershipMatch = line.match(/\(([^/()]+)\/(\d{2}\.\d{2}\.\d{2})\)/);
        if (membershipMatch) {
          const buyDate = membershipMatch[2];
          date = buyDate; // 차감 내역에 사용할 날짜 업데이트
          const namePart = line.replace(/\(([^/()]+)\/(\d{2}\.\d{2}\.\d{2})\)/, "").trim();
          membership = `${namePart}(${buyDate} 구매)`;
          return;
        }

        // 2. 총액 파싱
        if (line.startsWith("총")) {
          total = line;
          return;
        }

        // 3. 잔액 파싱
        if (line.includes("잔액:")) {
          balance = line;
          return;
        }

        // 4. 차감 항목 (가격 '원'이 포함된 경우)
        if (line.includes("원")) {
          usageItems.push(formatLine(line));
        }
      });

      // 최종 문구 조립
      let result = "안녕하세요~ 블리비 홍대점의 담당실장 가은빈입니다♡ 내원해주셔서 감사드리며 회원권 이용 내역 안내 드립니다.\n\n";

      if (elShowMembership.checked && membership) {
        result += `■보유 회원권\n${membership}\n\n`;
      }

      if (usageItems.length > 0) {
        result += `■차감내역(${date})\n`;
        usageItems.forEach(item => {
          result += `${item}\n`;
        });
        if (total) result += `${total}\n`;
        result += `※부가세 포함 금액\n\n`;
      }

      if (balance) {
        result += `■회원권 잔액(${date})\n`;
        result += `${balance}\n\n`;
      }

      if (elShowPetitInfo.checked) {
        result += `■쁘띠 가능시술\n제모/보톡스/필러/인모드/슈링크 1회/실리프팅/점 사마귀 비립종 제거/면역수액주사/윤곽주사/블리비V주사/블리비S주사\n\n`;
      }

      result += `오늘도 사랑스럽고 행복한 하루 보내세요♡ 감사합니다.\n\n`;
      result += `문의 및 예약\n카카오톡 > 블리비의원 홍대\n전화문의 > 1833-2141`;

      elOutput.value = result;
      elStatus.textContent = "DONE";
      elOutStatus.textContent = "COMPLETED";
    }

    function showToast(msg) {
      elToast.textContent = msg;
      elToast.classList.add('show');
      setTimeout(() => elToast.classList.remove('show'), 2000);
    }

    elBtnCopy.addEventListener('click', () => {
      if (!elOutput.value) return;
      elOutput.select();
      try {
        document.execCommand('copy');
        showToast("텍스트 복사 완료");
      } catch (err) {
        showToast("복사 실패");
      }
    });

    elBtnClear.addEventListener('click', () => {
      elInput.value = "";
      process();
      elInput.focus();
    });

    elInput.addEventListener('input', process);
    elShowMembership.addEventListener('change', process);
    elShowPetitInfo.addEventListener('change', process);

    process();
  </script>
</body>

</html>
